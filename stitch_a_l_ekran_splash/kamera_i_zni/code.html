<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f20db9",
                        "background-light": "#f8f5f8",
                        "background-dark": "#22101e",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>AlbaGO - Kamera İzni</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top App Bar -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1">Kamera İzni</h2>
<div class="size-12 shrink-0"></div>
</div>
<!-- Illustration Section -->
<div class="flex w-full grow @container p-6 flex-col items-center justify-center">
<div class="relative w-full max-w-[320px] aspect-square rounded-full bg-gradient-to-br from-primary/20 to-transparent flex items-center justify-center border-2 border-primary/10 mb-8">
<!-- Abstract Camera/Privacy Illustration using Tailwind and Icons -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-48 h-48 rounded-full bg-primary/10 flex items-center justify-center">
<div class="w-32 h-32 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 1">photo_camera</span>
</div>
</div>
</div>
<!-- Privacy Shield Overlay -->
<div class="absolute bottom-4 right-4 bg-primary text-white p-4 rounded-xl shadow-xl shadow-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-[32px]">shield</span>
</div>
<!-- Decorative background image pattern -->
<div class="absolute inset-0 opacity-10 bg-center bg-no-repeat bg-cover rounded-full" data-alt="Abstract geometric pattern of circles and lines" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBWEW65WsrcdPAEcpp8-Y42mN4WYARX_Huy-lcfT1gSBdt4tpuf8rEJDLoPXVXbIo2xCS6-E_qSuBxzkTgKY0lsJZTTmVdOwxbiwI4I5ALsRcljgeSyvnAJZnjH5RBE9uiN9SPdftsnXcr4BW7kZtzEUR0tztxnwJZ8UduJUiII2qHTtWmGPuqnXT6lqywkGeqkUrpgAPWVMnAptXC3bTznQAqaRgKobBzmxJbga-Eq3nUeW_1ZCIuIadypy51yEjfluUcLjvGvOjUA");'>
</div>
</div>
<!-- Content -->
<div class="max-w-[480px] w-full text-center space-y-4">
<h2 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight">
                    Kamera İzni Gerekiyor
                </h2>
<p class="text-slate-600 dark:text-slate-300 text-lg font-normal leading-relaxed px-2">
                    AlbaGO, hareketlerini algılamak için ön kameranı kullanır. Verilerin cihazında kalır ve asla kaydedilmez.
                </p>
</div>
</div>
<!-- Actions Container -->
<div class="flex justify-center pb-8">
<div class="flex flex-1 gap-4 max-w-[480px] flex-col items-stretch px-6 py-4">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-lg font-bold leading-normal tracking-wide w-full shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">
<span class="truncate">Kameraya İzin Ver</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary/10 dark:bg-primary/20 text-primary text-lg font-bold leading-normal tracking-wide w-full active:scale-[0.98] transition-transform">
<span class="truncate">Daha Fazla Bilgi</span>
</button>
<div class="mt-4 flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400 text-sm">
<span class="material-symbols-outlined text-[18px]">lock</span>
<span>Gizliliğiniz bizim için önemlidir</span>
</div>
</div>
</div>
<div class="h-2 bg-background-light dark:bg-background-dark"></div>
</div>
