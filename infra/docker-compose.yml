version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: alba-postgres
    environment:
      POSTGRES_DB: alba
      POSTGRES_USER: alba
      POSTGRES_PASSWORD: alba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: alba-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: alba-minio
    environment:
      MINIO_ROOT_USER: alba
      MINIO_ROOT_PASSWORD: alba12345
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
